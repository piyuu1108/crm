<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Sense</title>

    <style>
        /* Base Styles */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;

            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #47272C;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            color: #5c5c5c;
        }

        .center-box {
            width: 340px;
            background-color: #ffffff;

            border-radius: 8px;
            overflow: hidden;

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        }

        .title {
            margin: 0;

            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;

            color: #47272C;
        }

        /* Body */
        .panel-body {
            padding: 2rem;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.8rem;

            font-size: 1.05rem;
            font-weight: 400;

            color: #055BB5;
        }

        /* Inputs */
        input[type="text"],
        input[type="password"] {
            width: 100%;

            padding: 12px 14px;
            margin-bottom: 1rem;

            border: 1px solid #d7dbdd;
            border-radius: 8px;

            font-size: 0.95rem;
            color: #333;

            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #2e8cdc;
        }

        /* Button */
        .button {
            width: 100%;

            padding: 12px;

            border: none;
            border-radius: 8px;

            background-color: #44ac33;
            color: white;

            font-size: 0.95rem;
            font-weight: 600;

            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .button:hover {
            background-color: #388e2c;
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button.logout {
            background-color: #e76644;
        }

        .button.logout:hover {
            background-color: #c9523a;
        }

        /* Status */
        #statusmessage {
            margin-top: 12px;
            min-height: 18px;

            font-size: 0.82rem;
        }

        .red { color: #e76644; }
        .green { color: #44ac33; }

        .hidden { display: none; }

        /* Shake Animation */
        .shake {
            animation: shake 0.45s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
    </style>
</head>

<body>

    <!-- Login Panel -->
    <div class="center-box" id="login-panel">
        <div class="panel-body">
            <h1>Sign in to Begin Lab</h1>

            <input type="text" id="username" placeholder="College ID" autocomplete="off">
            <input type="password" id="password" placeholder="Password">

            <button class="button" id="loginbutton" onclick="handleLogin()">Sign In</button>

            <div id="statusmessage"></div>
        </div>
    </div>

    <!-- Logged-in Panel -->
    <div class="center-box hidden" id="session-panel">
        <div class="panel-body">
            <h1 class="green">✓ Login Successful</h1>
            <p style="margin-bottom:1.5rem;color:#888;font-size:0.9rem;">Session active. You may close this tab.</p>
            <button class="button logout" onclick="handleLogout()">Log Out</button>
        </div>
    </div>

    <script>
        const loginPanel = document.getElementById('login-panel');
        const sessionPanel = document.getElementById('session-panel');
        const status = document.getElementById('statusmessage');
        const loginBtn = document.getElementById('loginbutton');

        async function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!user || !pass) {
                showError("Please enter both credentials.");
                return;
            }

            loginBtn.disabled = true;
            status.innerText = "Connecting...";
            status.className = "";

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ collegeId: user, password: pass })
                });

                const data = await resp.json();

                if (!resp.ok) {
                    showError(data.error || "Login failed.");
                    return;
                }

                // Success
                document.getElementById('password').value = '';
                loginPanel.classList.add('hidden');
                sessionPanel.classList.remove('hidden');

            } catch (err) {
                showError("Cannot connect to server.");
            } finally {
                loginBtn.disabled = false;
            }
        }

        async function handleLogout() {
            try { await fetch('/api/logout', { method: 'POST' }); } catch(e) {}
            sessionPanel.classList.add('hidden');
            loginPanel.classList.remove('hidden');
            status.innerText = "";
        }

        function showError(msg) {
            status.innerText = msg;
            status.className = "red";
            loginPanel.classList.add("shake");
            setTimeout(() => loginPanel.classList.remove("shake"), 450);
        }

        document.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !loginPanel.classList.contains('hidden')) handleLogin();
        });

        // On load: check if already logged in
        (async () => {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                if (data.state === 'active') {
                    loginPanel.classList.add('hidden');
                    sessionPanel.classList.remove('hidden');
                }
            } catch(e) {}
        })();
    </script>

</body>
</html>
